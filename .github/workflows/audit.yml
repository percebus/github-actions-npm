name: npm audit

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      # FIXME move to secrets
      ssh-private-key:
        type: string
        description: SSH private key
        required: false

      working-directory:
        type: string
        description: Working directory
        required: false
        default: .

      npm_audit_cli_options:
        type: string
        description: npm audit CLI options
        required: false
        default: "--omit=dev"

  workflow_call: # SRC: https://docs.github.com/en/actions/using-workflows/reusing-workflows
    secrets:
      ssh-private-key:
        description: SSH private key
        required: false

    inputs:
      # FIXME move to secrets
      ssh-private-key:
        type: string
        description: SSH private key
        required: false

      working-directory:
        type: string
        description: Working directory
        required: false
        default: .

permissions:
  contents: read

jobs:
  npm_audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
        with:
          ssh-private-key: ${{ secrets.ssh-private-key || inputs.ssh-private-key }}

      - uses: percebus/github-actions-node/.github/actions/setup@main
      - uses: percebus/github-actions-npm/.github/actions/install@main

      - run: npm audit --prefix ${{ inputs.working-directory }} --omit=dev
        name: npm audit --omit=dev

      # NOTE: continue-on-error is set to true to avoid failing the entire workflow if vulnerabilities are found on devDependencies.
      # This allows us to report vulnerabilities without blocking the workflow, which can be useful for monitoring and addressing issues over time.
      - run: npm audit --prefix ${{ inputs.working-directory }}
        name: npm audit
        continue-on-error: true
