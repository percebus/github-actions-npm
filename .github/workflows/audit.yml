name: npm audit

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      # XXX
      ssh-private-key:
        type: string
        description: SSH private key
        required: false

      working-directory:
        type: string
        description: Working directory
        required: false
        default: .

      continue-on-error:
        type: boolean
        description: continue on error
        required: false
        default: true

  workflow_call: # SRC: https://docs.github.com/en/actions/using-workflows/reusing-workflows
    secrets:
      ssh-private-key:
        description: SSH private key
        required: false

    inputs:
      # XXX
      ssh-private-key:
        type: string
        description: SSH private key
        required: false

      working-directory:
        type: string
        description: Working directory
        required: false
        default: .

      continue-on-error:
        type: boolean
        description: continue on error
        required: false
        default: true

permissions:
  contents: read

jobs:
  npm_audit:
    name: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
        with:
          ssh-private-key: ${{ secrets.ssh-private-key || inputs.ssh-private-key }}

      - uses: percebus/github-actions-node/.github/actions/setup@main
      - uses: percebus/github-actions-npm/.github/actions/install@main

      - uses: percebus/github-actions-npm/.github/actions/audit@main
        with:
          working-directory: ${{ inputs.working-directory }}
          continue-on-error: ${{ inputs.continue-on-error }}
