name: Test workflows/run_cmd

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # XXX: Temporary workaround to force JavaScript actions to use Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  default:
    name: default
    uses: ./.github/workflows/run_cmd.yml

  cmd__matrix:
    needs: default
    strategy:
      max-parallel: 6
      fail-fast: false
      matrix:
        cmd:
          - npm test
          - npm test --ignore-scripts
          - npm run lint
          - echo bananas

    name: "cmd: '${{ matrix.cmd }}'"
    uses: ./.github/workflows/run_cmd.yml
    with:
      cmd: ${{ matrix.cmd }}

  working-directory__matrix:
    needs: default
    strategy:
      max-parallel: 6
      fail-fast: false
      matrix:
        working-directory:
          - .
          - node/sub-package

        OS:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    name: "prefix ${{ matrix.working-directory }} @ ${{ matrix.OS }}"
    uses: ./.github/workflows/run_cmd.yml
    with:
      cmd: pwd
      runs-on: ${{ matrix.OS }}
      working-directory: ${{ matrix.working-directory }}
